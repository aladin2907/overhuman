<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#050a12"/>
      <stop offset="50%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#050a12"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00d4aa" stop-opacity="0"/>
      <stop offset="20%" stop-color="#00d4aa" stop-opacity="1"/>
      <stop offset="80%" stop-color="#7c3aed" stop-opacity="1"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" fill="url(#bg)" rx="12"/>

  <!-- Grid lines -->
  <g opacity="0.06" stroke="#00d4aa">
    <line x1="0" y1="80" x2="900" y2="80" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="900" y2="160" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="900" y2="240" stroke-width="0.5"/>
    <line x1="150" y1="0" x2="150" y2="320" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="320" stroke-width="0.5"/>
    <line x1="450" y1="0" x2="450" y2="320" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="320" stroke-width="0.5"/>
    <line x1="750" y1="0" x2="750" y2="320" stroke-width="0.5"/>
  </g>

  <!-- Neural network dots -->
  <g opacity="0.15" fill="#00d4aa">
    <circle cx="120" cy="60" r="2"/>
    <circle cx="200" cy="100" r="1.5"/>
    <circle cx="340" cy="45" r="2"/>
    <circle cx="480" cy="80" r="1.5"/>
    <circle cx="620" cy="55" r="2"/>
    <circle cx="750" cy="90" r="1.5"/>
    <circle cx="180" cy="250" r="2"/>
    <circle cx="350" cy="270" r="1.5"/>
    <circle cx="520" cy="240" r="2"/>
    <circle cx="680" cy="260" r="1.5"/>
    <circle cx="800" cy="245" r="2"/>
    <circle cx="70" cy="150" r="1.5"/>
    <circle cx="830" cy="150" r="1.5"/>
  </g>

  <!-- Neural network connections -->
  <g opacity="0.08" stroke="#00d4aa" stroke-width="0.5">
    <line x1="120" y1="60" x2="200" y2="100"/>
    <line x1="200" y1="100" x2="340" y2="45"/>
    <line x1="340" y1="45" x2="480" y2="80"/>
    <line x1="480" y1="80" x2="620" y2="55"/>
    <line x1="620" y1="55" x2="750" y2="90"/>
    <line x1="180" y1="250" x2="350" y2="270"/>
    <line x1="350" y1="270" x2="520" y2="240"/>
    <line x1="520" y1="240" x2="680" y2="260"/>
    <line x1="680" y1="260" x2="800" y2="245"/>
    <line x1="120" y1="60" x2="70" y2="150"/>
    <line x1="750" y1="90" x2="830" y2="150"/>
    <line x1="70" y1="150" x2="180" y2="250"/>
    <line x1="830" y1="150" x2="800" y2="245"/>
  </g>

  <!-- Corner accents -->
  <g stroke="#00d4aa" stroke-width="1.5" opacity="0.4">
    <!-- Top-left -->
    <line x1="16" y1="16" x2="50" y2="16"/>
    <line x1="16" y1="16" x2="16" y2="50"/>
    <!-- Top-right -->
    <line x1="884" y1="16" x2="850" y2="16"/>
    <line x1="884" y1="16" x2="884" y2="50"/>
    <!-- Bottom-left -->
    <line x1="16" y1="304" x2="50" y2="304"/>
    <line x1="16" y1="304" x2="16" y2="270"/>
    <!-- Bottom-right -->
    <line x1="884" y1="304" x2="850" y2="304"/>
    <line x1="884" y1="304" x2="884" y2="270"/>
  </g>

  <!-- Title -->
  <text x="450" y="120" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="56" font-weight="700" fill="#e6edf3" filter="url(#glow)">OVERHUMAN</text>

  <!-- Accent line under title -->
  <rect x="250" y="138" width="400" height="2" fill="url(#accentLine)" rx="1"/>

  <!-- Subtitle -->
  <text x="450" y="172" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="15" fill="#8b949e" letter-spacing="3">SELF-EVOLVING AI DAEMON</text>

  <!-- Pipeline visualization -->
  <g transform="translate(130, 210)">
    <!-- Pipeline stages -->
    <g filter="url(#glow)">
      <!-- Stage circles -->
      <circle cx="0" cy="0" r="12" fill="none" stroke="#3fb950" stroke-width="2"/>
      <circle cx="72" cy="0" r="12" fill="none" stroke="#3fb950" stroke-width="2"/>
      <circle cx="144" cy="0" r="12" fill="none" stroke="#3fb950" stroke-width="2"/>
      <circle cx="216" cy="0" r="12" fill="none" stroke="#00d4aa" stroke-width="2.5" opacity="1"/>
      <circle cx="288" cy="0" r="12" fill="none" stroke="#30363d" stroke-width="1.5"/>
      <circle cx="360" cy="0" r="12" fill="none" stroke="#30363d" stroke-width="1.5"/>
      <circle cx="432" cy="0" r="12" fill="none" stroke="#30363d" stroke-width="1.5"/>
      <circle cx="504" cy="0" r="12" fill="none" stroke="#30363d" stroke-width="1.5"/>
      <circle cx="576" cy="0" r="12" fill="none" stroke="#30363d" stroke-width="1.5"/>
      <circle cx="648" cy="0" r="12" fill="none" stroke="#30363d" stroke-width="1.5"/>

      <!-- Active stage glow -->
      <circle cx="216" cy="0" r="16" fill="none" stroke="#00d4aa" stroke-width="1" opacity="0.3"/>

      <!-- Checkmarks for completed -->
      <text x="0" y="5" text-anchor="middle" font-size="12" fill="#3fb950">&#10003;</text>
      <text x="72" y="5" text-anchor="middle" font-size="12" fill="#3fb950">&#10003;</text>
      <text x="144" y="5" text-anchor="middle" font-size="12" fill="#3fb950">&#10003;</text>

      <!-- Active dot -->
      <circle cx="216" cy="0" r="4" fill="#00d4aa"/>

      <!-- Stage numbers for pending -->
      <text x="288" y="4" text-anchor="middle" font-family="monospace" font-size="10" fill="#6e7681">5</text>
      <text x="360" y="4" text-anchor="middle" font-family="monospace" font-size="10" fill="#6e7681">6</text>
      <text x="432" y="4" text-anchor="middle" font-family="monospace" font-size="10" fill="#6e7681">7</text>
      <text x="504" y="4" text-anchor="middle" font-family="monospace" font-size="10" fill="#6e7681">8</text>
      <text x="576" y="4" text-anchor="middle" font-family="monospace" font-size="10" fill="#6e7681">9</text>
      <text x="648" y="4" text-anchor="middle" font-family="monospace" font-size="10" fill="#6e7681">10</text>

      <!-- Connectors -->
      <line x1="12" y1="0" x2="60" y2="0" stroke="#3fb950" stroke-width="1.5"/>
      <line x1="84" y1="0" x2="132" y2="0" stroke="#3fb950" stroke-width="1.5"/>
      <line x1="156" y1="0" x2="204" y2="0" stroke="#00d4aa" stroke-width="1.5"/>
      <line x1="228" y1="0" x2="276" y2="0" stroke="#30363d" stroke-width="1" stroke-dasharray="4 3"/>
      <line x1="300" y1="0" x2="348" y2="0" stroke="#30363d" stroke-width="1" stroke-dasharray="4 3"/>
      <line x1="372" y1="0" x2="420" y2="0" stroke="#30363d" stroke-width="1" stroke-dasharray="4 3"/>
      <line x1="444" y1="0" x2="492" y2="0" stroke="#30363d" stroke-width="1" stroke-dasharray="4 3"/>
      <line x1="516" y1="0" x2="564" y2="0" stroke="#30363d" stroke-width="1" stroke-dasharray="4 3"/>
      <line x1="588" y1="0" x2="636" y2="0" stroke="#30363d" stroke-width="1" stroke-dasharray="4 3"/>
    </g>

    <!-- Stage labels -->
    <text x="0" y="30" text-anchor="middle" font-family="monospace" font-size="8" fill="#6e7681">IN</text>
    <text x="72" y="30" text-anchor="middle" font-family="monospace" font-size="8" fill="#6e7681">CL</text>
    <text x="144" y="30" text-anchor="middle" font-family="monospace" font-size="8" fill="#6e7681">PL</text>
    <text x="216" y="30" text-anchor="middle" font-family="monospace" font-size="8" fill="#00d4aa">AG</text>
    <text x="288" y="30" text-anchor="middle" font-family="monospace" font-size="8" fill="#6e7681">EX</text>
    <text x="360" y="30" text-anchor="middle" font-family="monospace" font-size="8" fill="#6e7681">RV</text>
    <text x="432" y="30" text-anchor="middle" font-family="monospace" font-size="8" fill="#6e7681">ME</text>
    <text x="504" y="30" text-anchor="middle" font-family="monospace" font-size="8" fill="#6e7681">PT</text>
    <text x="576" y="30" text-anchor="middle" font-family="monospace" font-size="8" fill="#6e7681">RF</text>
    <text x="648" y="30" text-anchor="middle" font-family="monospace" font-size="8" fill="#6e7681">GO</text>
  </g>

  <!-- Feature tags -->
  <g transform="translate(450, 280)" text-anchor="middle">
    <g transform="translate(-280, 0)">
      <rect x="-40" y="-11" width="80" height="22" rx="11" fill="none" stroke="#30363d" stroke-width="1"/>
      <text y="4" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">GenUI</text>
    </g>
    <g transform="translate(-160, 0)">
      <rect x="-48" y="-11" width="96" height="22" rx="11" fill="none" stroke="#30363d" stroke-width="1"/>
      <text y="4" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">10 Stages</text>
    </g>
    <g transform="translate(-30, 0)">
      <rect x="-50" y="-11" width="100" height="22" rx="11" fill="none" stroke="#30363d" stroke-width="1"/>
      <text y="4" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">Self-Healing</text>
    </g>
    <g transform="translate(100, 0)">
      <rect x="-40" y="-11" width="80" height="22" rx="11" fill="none" stroke="#30363d" stroke-width="1"/>
      <text y="4" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">Kiosk</text>
    </g>
    <g transform="translate(210, 0)">
      <rect x="-37" y="-11" width="74" height="22" rx="11" fill="none" stroke="#30363d" stroke-width="1"/>
      <text y="4" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">3 deps</text>
    </g>
  </g>

  <!-- Border glow -->
  <rect x="0.5" y="0.5" width="899" height="319" fill="none" stroke="url(#accentLine)" stroke-width="1" rx="12" opacity="0.3"/>
</svg>
