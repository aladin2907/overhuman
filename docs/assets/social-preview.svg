<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" fill="none">
  <defs>
    <linearGradient id="bgS" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#050a12"/>
      <stop offset="50%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#050a12"/>
    </linearGradient>
    <linearGradient id="accentS" x1="300" y1="0" x2="980" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00d4aa" stop-opacity="0"/>
      <stop offset="20%" stop-color="#00d4aa"/>
      <stop offset="80%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
    <filter id="glowS">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bgS)"/>

  <!-- Grid -->
  <g opacity="0.04" stroke="#00d4aa">
    <line x1="0" y1="160" x2="1280" y2="160" stroke-width="0.5"/>
    <line x1="0" y1="320" x2="1280" y2="320" stroke-width="0.5"/>
    <line x1="0" y1="480" x2="1280" y2="480" stroke-width="0.5"/>
    <line x1="256" y1="0" x2="256" y2="640" stroke-width="0.5"/>
    <line x1="512" y1="0" x2="512" y2="640" stroke-width="0.5"/>
    <line x1="768" y1="0" x2="768" y2="640" stroke-width="0.5"/>
    <line x1="1024" y1="0" x2="1024" y2="640" stroke-width="0.5"/>
  </g>

  <!-- Neural dots -->
  <g opacity="0.12" fill="#00d4aa">
    <circle cx="150" cy="100" r="2.5"/><circle cx="300" cy="70" r="2"/>
    <circle cx="500" cy="120" r="2.5"/><circle cx="700" cy="80" r="2"/>
    <circle cx="900" cy="110" r="2.5"/><circle cx="1100" cy="75" r="2"/>
    <circle cx="200" cy="520" r="2.5"/><circle cx="450" cy="550" r="2"/>
    <circle cx="700" cy="530" r="2.5"/><circle cx="950" cy="560" r="2"/>
    <circle cx="1150" cy="540" r="2.5"/>
  </g>
  <g opacity="0.06" stroke="#00d4aa" stroke-width="0.5">
    <line x1="150" y1="100" x2="300" y2="70"/>
    <line x1="300" y1="70" x2="500" y2="120"/>
    <line x1="500" y1="120" x2="700" y2="80"/>
    <line x1="700" y1="80" x2="900" y2="110"/>
    <line x1="900" y1="110" x2="1100" y2="75"/>
    <line x1="200" y1="520" x2="450" y2="550"/>
    <line x1="450" y1="550" x2="700" y2="530"/>
    <line x1="700" y1="530" x2="950" y2="560"/>
    <line x1="950" y1="560" x2="1150" y2="540"/>
  </g>

  <!-- Corner accents -->
  <g stroke="#00d4aa" stroke-width="2" opacity="0.3">
    <line x1="24" y1="24" x2="70" y2="24"/><line x1="24" y1="24" x2="24" y2="70"/>
    <line x1="1256" y1="24" x2="1210" y2="24"/><line x1="1256" y1="24" x2="1256" y2="70"/>
    <line x1="24" y1="616" x2="70" y2="616"/><line x1="24" y1="616" x2="24" y2="570"/>
    <line x1="1256" y1="616" x2="1210" y2="616"/><line x1="1256" y1="616" x2="1256" y2="570"/>
  </g>

  <!-- Title -->
  <text x="640" y="220" text-anchor="middle" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="80" font-weight="700" fill="#e6edf3" filter="url(#glowS)">OVERHUMAN</text>

  <!-- Accent line -->
  <rect x="340" y="245" width="600" height="3" fill="url(#accentS)" rx="1.5"/>

  <!-- Subtitle -->
  <text x="640" y="295" text-anchor="middle" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="22" fill="#8b949e" letter-spacing="4">SELF-EVOLVING AI DAEMON</text>

  <!-- Description -->
  <text x="640" y="350" text-anchor="middle" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="16" fill="#6e7681">Fully generative UI · 10-stage pipeline · 4-level reflection</text>

  <!-- Pipeline HUD -->
  <g transform="translate(240, 420)">
    <g filter="url(#glowS)">
      <circle cx="0" cy="0" r="16" fill="none" stroke="#3fb950" stroke-width="2.5"/>
      <circle cx="88" cy="0" r="16" fill="none" stroke="#3fb950" stroke-width="2.5"/>
      <circle cx="176" cy="0" r="16" fill="none" stroke="#3fb950" stroke-width="2.5"/>
      <circle cx="264" cy="0" r="16" fill="none" stroke="#00d4aa" stroke-width="3"/>
      <circle cx="264" cy="0" r="21" fill="none" stroke="#00d4aa" stroke-width="1" opacity="0.3"/>
      <circle cx="352" cy="0" r="16" fill="none" stroke="#30363d" stroke-width="1.5"/>
      <circle cx="440" cy="0" r="16" fill="none" stroke="#30363d" stroke-width="1.5"/>
      <circle cx="528" cy="0" r="16" fill="none" stroke="#30363d" stroke-width="1.5"/>
      <circle cx="616" cy="0" r="16" fill="none" stroke="#30363d" stroke-width="1.5"/>
      <circle cx="704" cy="0" r="16" fill="none" stroke="#30363d" stroke-width="1.5"/>
      <circle cx="792" cy="0" r="16" fill="none" stroke="#30363d" stroke-width="1.5"/>

      <text x="0" y="6" text-anchor="middle" font-size="15" fill="#3fb950">&#10003;</text>
      <text x="88" y="6" text-anchor="middle" font-size="15" fill="#3fb950">&#10003;</text>
      <text x="176" y="6" text-anchor="middle" font-size="15" fill="#3fb950">&#10003;</text>
      <circle cx="264" cy="0" r="5" fill="#00d4aa"/>
      <text x="352" y="5" text-anchor="middle" font-family="monospace" font-size="12" fill="#6e7681">5</text>
      <text x="440" y="5" text-anchor="middle" font-family="monospace" font-size="12" fill="#6e7681">6</text>
      <text x="528" y="5" text-anchor="middle" font-family="monospace" font-size="12" fill="#6e7681">7</text>
      <text x="616" y="5" text-anchor="middle" font-family="monospace" font-size="12" fill="#6e7681">8</text>
      <text x="704" y="5" text-anchor="middle" font-family="monospace" font-size="12" fill="#6e7681">9</text>
      <text x="792" y="5" text-anchor="middle" font-family="monospace" font-size="12" fill="#6e7681">10</text>

      <line x1="16" y1="0" x2="72" y2="0" stroke="#3fb950" stroke-width="2"/>
      <line x1="104" y1="0" x2="160" y2="0" stroke="#3fb950" stroke-width="2"/>
      <line x1="192" y1="0" x2="248" y2="0" stroke="#00d4aa" stroke-width="2"/>
      <line x1="280" y1="0" x2="336" y2="0" stroke="#30363d" stroke-width="1" stroke-dasharray="5 4"/>
      <line x1="368" y1="0" x2="424" y2="0" stroke="#30363d" stroke-width="1" stroke-dasharray="5 4"/>
      <line x1="456" y1="0" x2="512" y2="0" stroke="#30363d" stroke-width="1" stroke-dasharray="5 4"/>
      <line x1="544" y1="0" x2="600" y2="0" stroke="#30363d" stroke-width="1" stroke-dasharray="5 4"/>
      <line x1="632" y1="0" x2="688" y2="0" stroke="#30363d" stroke-width="1" stroke-dasharray="5 4"/>
      <line x1="720" y1="0" x2="776" y2="0" stroke="#30363d" stroke-width="1" stroke-dasharray="5 4"/>
    </g>
  </g>

  <!-- Feature tags -->
  <g transform="translate(640, 520)" text-anchor="middle">
    <g transform="translate(-320, 0)">
      <rect x="-55" y="-14" width="110" height="28" rx="14" fill="none" stroke="#30363d" stroke-width="1"/>
      <text y="5" font-family="monospace" font-size="13" fill="#8b949e" text-anchor="middle">GenUI</text>
    </g>
    <g transform="translate(-160, 0)">
      <rect x="-55" y="-14" width="110" height="28" rx="14" fill="none" stroke="#30363d" stroke-width="1"/>
      <text y="5" font-family="monospace" font-size="13" fill="#8b949e" text-anchor="middle">6 Channels</text>
    </g>
    <g transform="translate(0, 0)">
      <rect x="-55" y="-14" width="110" height="28" rx="14" fill="none" stroke="#30363d" stroke-width="1"/>
      <text y="5" font-family="monospace" font-size="13" fill="#8b949e" text-anchor="middle">Self-Healing</text>
    </g>
    <g transform="translate(160, 0)">
      <rect x="-55" y="-14" width="110" height="28" rx="14" fill="none" stroke="#30363d" stroke-width="1"/>
      <text y="5" font-family="monospace" font-size="13" fill="#8b949e" text-anchor="middle">Pure Go</text>
    </g>
    <g transform="translate(320, 0)">
      <rect x="-55" y="-14" width="110" height="28" rx="14" fill="none" stroke="#30363d" stroke-width="1"/>
      <text y="5" font-family="monospace" font-size="13" fill="#8b949e" text-anchor="middle">3 deps</text>
    </g>
  </g>

  <!-- Bottom info -->
  <text x="640" y="590" text-anchor="middle" font-family="monospace" font-size="14" fill="#6e7681">github.com/aladin2907/overhuman</text>

  <!-- Border -->
  <rect x="1" y="1" width="1278" height="638" fill="none" stroke="url(#accentS)" stroke-width="1" opacity="0.2"/>
</svg>
